<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Maintenance | JRHomeandProperty</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, navy, #1c1c1c);
      color: silver;
      text-align: center;
    }

    header {
      background: #001f3f;
      padding: 25px;
      border-bottom: 4px solid silver;
    }

    h1 {
      color: silver;
      font-size: 38px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: silver;
      color: navy;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 40px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .photo-card {
      background: rgba(255, 255, 255, 0.08);
      border: 3px solid silver;
      border-radius: 15px;
      padding: 15px;
    }

    .photo-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid silver;
    }

    .photo-card h2 {
      color: white;
      margin-top: 12px;
      font-size: 24px;
    }

    .photo-card p {
      color: silver;
      font-weight: bold;
      font-size: 17px;
      line-height: 1.5;
    }

    .description {
      max-width: 850px;
      margin: auto;
      font-size: 20px;
      font-weight: bold;
      padding: 20px;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    <h1>Property Maintenance</h1>
    <a href="index.html" class="back-btn">Back Home</a>
  </header>

  <p class="description">
    JRHomeandProperty provides property maintenance services to help keep homes,
    yards, and outdoor spaces clean, safe, repaired, and looking good.
  </p>

  <section class="photo-grid">

    <div class="photo-card">
      <img src="propertym.jpg" alt="Property maintenance service">
      <h2>Property Maintenance Service</h2>
      <p>Routine upkeep to help keep your property clean and in good shape.</p>
    </div>

  </section>

</body>
</html>
